# CDN reverse proxy for DigitalOcean Spaces media files
# Caches responses locally and serves with long cache headers

proxy_cache_path /var/cache/nginx/cdn levels=1:2 keys_zone=cdn_cache:10m max_size=10g inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name cdn.heroesandmore.com;

    # Redirect HTTP to HTTPS
    return 301 https://cdn.heroesandmore.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cdn.heroesandmore.com;

    # SSL configuration (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/cdn.heroesandmore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.heroesandmore.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    resolver 1.1.1.1;

    location /media/ {
        # Strip /media/ prefix — the Space already has media/ in its path
        rewrite ^/media/(.*)$ /$1 break;

        proxy_pass https://nyc3.digitaloceanspaces.com/heroesandmore/media/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host nyc3.digitaloceanspaces.com;
        proxy_set_header X-Real-IP $remote_addr;

        # Caching
        proxy_cache cdn_cache;
        proxy_cache_key "$scheme$request_uri";
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        # Cache status header (HIT/MISS/BYPASS/etc)
        add_header X-Cache-Status $upstream_cache_status;

        # CORS
        add_header Access-Control-Allow-Origin "https://heroesandmore.com" always;

        # Long cache headers
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # Root fallback — redirect to main site
    location / {
        return 301 https://heroesandmore.com$request_uri;
    }

    # Health check
    location /health/ {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

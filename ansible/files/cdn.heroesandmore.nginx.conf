# CDN for media files — serves from local filesystem
# Cookie-free domain, parallel browser connections, long cache headers
# Easy migration path: swap alias for proxy_pass to move to external storage later

server {
    listen 80;
    server_name cdn.heroesandmore.com;

    # Redirect HTTP to HTTPS
    return 301 https://cdn.heroesandmore.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cdn.heroesandmore.com;

    # SSL configuration (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/cdn.heroesandmore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.heroesandmore.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /media/ {
        alias /home/www/heroesandmore/media/;

        # CORS
        add_header Access-Control-Allow-Origin "https://heroesandmore.com" always;

        # Long cache headers — images are immutable (new uploads get new filenames)
        add_header Cache-Control "public, max-age=2592000, immutable" always;

        # Serve WebP with correct content type
        types {
            image/webp webp;
        }

        expires 30d;
    }

    # Root fallback — redirect to main site
    location / {
        return 301 https://heroesandmore.com$request_uri;
    }

    # Health check
    location /health/ {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Under Maintenance - HeroesAndMore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, -apple-system, sans-serif; background: #f7f7f9; color: #171717; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .container { max-width: 520px; text-align: center; }
    .logo { font-size: 1.5rem; font-weight: 800; color: #171717; letter-spacing: -0.03em; margin-bottom: 2rem; }
    .logo span { color: #e63946; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #6b7280; line-height: 1.6; margin-bottom: 1rem; }
    .card { background: #fff; border-radius: 12px; padding: 2.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 1.5rem; }
    .btn { display: inline-block; padding: 0.75rem 2rem; background: #171717; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #333; }
    .meta { font-size: 0.8rem; color: #9ca3af; margin-top: 1.5rem; }
  </style>
  <meta http-equiv="refresh" content="30">
</head>
<body>
  <div class="container">
    <div class="logo">Heroes<span>&</span>More</div>
    <div class="card">
      <div class="icon">&#9881;&#65039;</div>
      <h1>Scheduled Maintenance</h1>
      <p>We're performing scheduled maintenance to improve the platform. We'll be back online shortly.</p>
      <p>This page will automatically refresh.</p>
      <a href="/" class="btn">Try Again</a>
    </div>
    <p class="meta">Thank you for your patience.</p>
  </div>
</body>
</html>
